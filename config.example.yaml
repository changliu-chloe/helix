# helix 配置模板 —— 复制为 config.yaml 后填写自己的值
#   cp config.example.yaml config.yaml
# config.yaml 含 API key 等隐私，已 gitignore，不会进版本控制。
# 检索与打分完全由本文件驱动。修改这里即可调整关注方向。

language: zh                 # zh | en，影响笔记语言
# 所有本地数据的根目录：笔记/复现/实验/索引都落在它下面。只需 gitignore 这一个目录。
# 相对路径锚定到 config.yaml 所在目录；旧版数据散在顶层时跑 `helix migrate --yes` 搬进来。
workspace_dir: workspace
notes_dir: notes             # 笔记库（相对 workspace_dir）；填绝对路径可指向外部 Obsidian vault（则留在外部不搬）
papers_subdir: papers        # 单篇深读笔记子目录（相对 notes_dir）
daily_subdir: daily          # 每日推荐笔记子目录（相对 notes_dir）
review_subdir: reviews       # 文献综述笔记子目录（相对 notes_dir）
experiments_dir: experiments # 实验工作区（复现别人 + 我自己的实验，相对 workspace_dir）
                             # 旧版叫 repro_dir；跑 `helix migrate` 会自动改名为 experiments_dir（保留你的值）

# 文献综述 / 独立评审打分（见 skills/review、skills/deep-read）
# reviewer_model：经 Codex MCP 调用的独立评审模型，给论文打三维分（相关性/创新性/可靠性）。
#   须为 OpenAI 模型（如 gpt-5.6-sol / o3 / gpt-4o）。用全新线程零先验上下文，避免自评虚高。
reviewer_model: gpt-5.6-sol
# review_funnel_top_n：方向检索做综述时，摘要级粗筛后取前 N 篇进精读（漏斗宽口→窄口）。可与需求商量调整。
review_funnel_top_n: 10

# Semantic Scholar API key（可选，留空走匿名限流接口）
# 也可用环境变量 SEMANTIC_SCHOLAR_API_KEY
semantic_scholar_api_key: ''

# MinerU 云端 API key（用于 helix fetch 把 PDF 全文转 markdown；留空则 fetch 只抽高清图）
# 也可用环境变量 MINERU_API_KEY。需先装：uv pip install 'helix[fulltext]'
mineru_api_key: ''

# 打分权重（四维，和为 1.0）。见 score.py
score_weights:
  relevance: 0.40            # 相关性：与研究关键词/分类的匹配度
  recency: 0.20             # 新近性：越新越高
  popularity: 0.30          # 热度：引用数 / 新论文热度
  quality: 0.10             # 质量：从摘要推断的创新性

# 全局排除关键词（命中即降权/剔除）
excluded_keywords:
  - workshop

# 研究领域。每个领域有独立的关键词、arXiv 分类和优先级(1-5)
# 可手动维护，也可在深读时由 agent 判断新方向后询问你是否追加（见 skills/deep-read）
research_domains:
  示例-VLA模型:
    keywords:
      - vision language action
      - VLA
      - robotic manipulation
      - embodied AI
      - OpenVLA
    arxiv_categories:
      - cs.RO
      - cs.CV
      - cs.AI
      - cs.LG
    priority: 5

# 可复现硬件档。复现方案据此判断模型装不装得下、要不要量化/多卡/offload。
# 一次配置，所有论文复用。vram_gb 是单卡显存，total = vram_gb × num_gpus。
# 示例为单机八卡节点；按你的实际机器改。复现优先用排在前面的档。
hardware_profiles:
  a100-8x40g:
    gpu_model: A100-40GB
    vram_gb: 40
    num_gpus: 8
    interconnect: NVLink      # 多卡张量并行(TP)靠 NVLink；PCIe 会显著拖慢
    notes: 单机 8×40G=320G。TP8 可跑 235B-fp8；单卡 40G 跑 7B 全精度。
  h20-8x96g:
    gpu_model: H20
    vram_gb: 96
    num_gpus: 8
    interconnect: NVLink
    notes: 单机 8×96G=768G，可 TP8 跑 355B-fp8。

# 远程 GPU 机器册（可选，留空即远程功能关闭）。
# 笔记/代码在本地、实验在远程时用：helix exp start/run/probe/push/pull 在远程编排跑实验、拉结果。
# 这里只登记「机器长什么样」（非敏感）；「某个实验推/拉哪些文件」在每个工作区的 sync.yaml 里（贴着实验走）。
# 凭据（SSH/sudo 密码）不放这里，放 config.secrets.yaml（已 gitignore）；优先用 SSH key 免密则无需密码。
remotes:
  gpu-a100:
    host: gpu-a100                     # ssh 目标，建议是 ~/.ssh/config 的 alias
    user: ''                           # ssh 用户，可留空走 ~/.ssh/config
    ssh_key: ''                        # 可选 identity 文件路径，留空用默认 key / agent
    remote_repro_root: /data/helix-experiments   # 远程实验根目录
    hardware_profile: a100-8x40g       # 这台机对应上面哪个硬件档（复用判级）

# 可选：用 git 管理实验代码版本。开启后 `helix exp start` 把每个实验工作区当独立 git 仓库
# （一实验一仓库，与 sync.yaml 同目录）：需要就 git init、用下面的身份写进该仓库 .git/config、
# 提交本轮改动，再传到远程跑。提交信息由 agent 按约定式风格给（如 "feat: xxx"，带类型前缀）。
# 关闭（默认）则 exp start 只 push、不碰 git。身份只写仓库级 .git/config，不动你的 ~/.gitconfig。
git:
  enabled: false                       # true 才启用；默认关
  name: ''                             # 提交作者名（开启时必填）
  email: ''                            # 提交作者邮箱（开启时必填）
