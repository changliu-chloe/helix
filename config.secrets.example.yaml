# helix 远程凭据模板 —— 复制为 config.secrets.yaml 后填写
#   cp config.secrets.example.yaml config.secrets.yaml
#
# 【安全】此文件含 SSH/sudo 密码，已 gitignore，绝不进版本控制。
# 只由 helix CLI 读取，在 ssh 子进程边界经 env(SSHPASS) / stdin(sudo -S) 注入远程——
# 绝不进入命令行参数、日志，也绝不进入任何大模型请求。agent 只调 helix 命令，看不到这里的明文。
#
# 【优先免密】能配 ~/.ssh/config + SSH key 免密的机器，这里整个留空即可（最安全）。
# 通常只有 sudo 才真需要密码。用密码登录需先装 sshpass。

remotes:
  gpu-a100:                     # 对应 config.yaml remotes 里的机器名
    ssh_password: ''            # 留空 = 用 SSH key 免密（推荐）
    sudo_password: ''           # 留空 = 无需 sudo 或 sudo 免密
